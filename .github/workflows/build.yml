name: Build Check (Frontend)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: FE/next-best-practice-template/package-lock.json

    - name: Install dependencies
      working-directory: FE/next-best-practice-template
      run: npm ci

    - name: Build
      working-directory: FE/next-best-practice-template
      run: npm run build
